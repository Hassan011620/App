name: 🏷️ Release Signed APK

on:
  push:
    tags:
      - 'v*'   # يعمل عند إنشاء tag مثل: v1.0.0

jobs:
  release:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: 🔤 Download Inter fonts
        run: |
          mkdir -p assets/fonts assets/images assets/icons
          curl -L "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-Regular.otf" -o assets/fonts/Inter-Regular.ttf
          curl -L "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-Medium.otf"  -o assets/fonts/Inter-Medium.ttf
          curl -L "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-SemiBold.otf" -o assets/fonts/Inter-SemiBold.ttf
          curl -L "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-Bold.otf"    -o assets/fonts/Inter-Bold.ttf

      - name: 📦 Install dependencies
        run: flutter pub get

      # ── فك تشفير Keystore من Secrets ───────────────────
      - name: 🔐 Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/nfcpay-release.jks
          echo "✅ Keystore decoded"

      # ── إنشاء key.properties ────────────────────────────
      - name: 📝 Create key.properties
        env:
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:    ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=nfcpay-release.jks
          EOF

      # ── بناء APK موقّع ──────────────────────────────────
      - name: 🔨 Build Signed Release APK
        run: flutter build apk --release

      # ── بناء App Bundle للمتجر ──────────────────────────
      - name: 📦 Build App Bundle
        run: flutter build appbundle --release

      # ── إنشاء GitHub Release ────────────────────────────
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NFC Pay ${{ github.ref_name }}
          body: |
            ## 📱 NFC Pay ${{ github.ref_name }}

            ### التغييرات في هذا الإصدار
            - تحديث تلقائي عبر GitHub Actions

            ### ملفات التثبيت
            - `app-release.apk` — للتثبيت المباشر على Android
            - `app-release.aab` — لرفع Google Play

            ### متطلبات التشغيل
            - Android 7.0+ (API 24)
            - NFC مفعّل في الجهاز
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
