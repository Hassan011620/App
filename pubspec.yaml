name: nfc_pay
description: NFC Pay - Closed Loop Payment System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # NFC
  nfc_manager: ^3.3.0

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Auth
  local_auth: ^2.2.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # UI
  pin_code_fields: ^8.0.1

  # Charts
  fl_chart: ^0.68.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  sensors_plus: ^4.0.2

  # Security
  flutter_jailbreak_detection: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
